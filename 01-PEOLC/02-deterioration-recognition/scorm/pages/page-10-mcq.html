<section class="page" id="page-10" aria-label="Case study assessment — Bob Evans"
         style="background:linear-gradient(160deg, var(--navy-dark) 0%, #1a3466 100%);">
  <div class="mcq-wrap" style="max-width:820px; margin:0 auto; padding:48px 32px 48px;">
    <div class="mcq-header">
      <h2 style="font-family:'Merriweather',serif; font-size:1.75rem; font-weight:700; color:#fff; margin-bottom:8px;">What Would You Do?</h2>
      <p style="font-size:.9rem; color:rgba(255,255,255,.7); line-height:1.7; max-width:560px; margin:0 auto;">Based on what you know about Bob Evans, answer each question below. You must complete all questions before continuing.</p>
    </div>

    <div class="mcq-progress" id="mcq-dots" role="status" aria-live="polite" aria-label="MCQ progress" style="margin:24px 0;"></div>
    <div id="mcq-questions-container"></div>
    <div class="mcq-results" id="mcq-results" role="region" aria-label="MCQ results" aria-live="polite"></div>

    <!-- Nav — inside mcq-wrap, gated until MCQ complete -->
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-top:36px; padding-top:24px; border-top:1px solid rgba(255,255,255,.1);">
      <button class="btn btn-secondary" onclick="goToPage(9)">← Back</button>
      <button class="btn btn-primary" id="mcq-continue-btn"
              style="opacity:.4; cursor:not-allowed;"
              disabled
              aria-label="Complete all questions to continue"
              onclick="goToPage(11)">
        Visit Bob Again →
      </button>
    </div>
  </div>
</section>
